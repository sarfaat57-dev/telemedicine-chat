<!DOCTYPE html>
<html>
<head>
    <title>Telemedicine Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0b141a, #202c33);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 35px;
            border-radius: 18px;
            backdrop-filter: blur(12px);
            width: 320px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);

            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 70px;
            margin-bottom: 10px;
            animation: pop 0.6s ease;
        }

        @keyframes pop {
            from { transform: scale(0.8); }
            to { transform: scale(1); }
        }

        h2 {
            margin-bottom: 10px;
        }

        .secure {
            font-size: 12px;
            color: #00ff88;
            margin-bottom: 15px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            box-shadow: 0 0 8px #00a884;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #00a884;
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #019875;
            transform: scale(1.05);
        }

        .footer {
            font-size: 11px;
            margin-top: 15px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="login-box">

    <!-- 🏥 LOGO -->
    <img src="https://cdn-icons-png.flaticon.com/512/2966/2966480.png" class="logo">

    <h2>Telemedicine Login 🔒</h2>

    <div class="secure">🟢 Secure TLS Enabled</div>

    <form method="POST">

        <input type="text" name="user" placeholder="Enter Username" required>

        <input type="password" name="password" placeholder="Enter Password" required>

        <!-- 👤 ROLE DROPDOWN -->
        <select name="role" required>
            <option value="">Select Role</option>
            <option value="Doctor">Doctor</option>
            <option value="Patient">Patient</option>
        </select>

        <button type="submit">Login</button>

    </form>

    <div class="footer">
        Secure Medical Communication System
    </div>

</div>

</body>
</html>
